<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">ScaleX</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Blogs</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>

        <button class="btn">Get Started</button>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Insights & Blogs</h1>

        <div class="categories">
            <button class="active">All</button>
            <button>Tech</button>
            <button>SaaS</button>

    <section class="blog-container">

                <span class="tag">Tech</span>
                <h3>The Ultimate Guide To SaaS Marketing</h3>
                <p>May 23, 2025</p>

        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800" alt="">
            <div class="card-content">
                <span class="tag">SaaS</span>
                <h3>5 Key Trends In SaaS Growth For 2025</h3>
                <p>May 23, 2025</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=800" alt="">
            <div class="card-content">
                <span class="tag">Marketing</span>
                <h3>How Data-Driven Strategies Are Important</h3>
                <p>May 23, 2025</p>
            </div>
        </div>

</html>
